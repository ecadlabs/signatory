version: 2

builds:
# Dynamic builds (for Docker images, supports dlopen/PKCS11)
  - id: signatory-linux-amd
    binary: signatory
    env:
      - CGO_ENABLED=1
      - CC=gcc
      - CXX=g++
    main: ./cmd/signatory/main.go
    ldflags:
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitBranch={{.Version}}'
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - '{{ if .IsSnapshot }}-cover{{ else }}-v{{ end }}'

  - id: signatory-cli-linux-amd
    binary: signatory-cli
    env:
      - CGO_ENABLED=1
      - CC=gcc
      - CXX=g++
    main: ./cmd/signatory-cli/main.go
    ldflags:
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitBranch={{.Version}}'
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - '{{ if .IsSnapshot }}-cover{{ else }}-v{{ end }}'

  - id: signatory-linux-arm64
    binary: signatory
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    main: ./cmd/signatory/main.go
    ldflags:
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitBranch={{.Version}}'
    goos:
      - linux
    goarch:
      - arm64
    flags:
      - '{{ if .IsSnapshot }}-cover{{ else }}-v{{ end }}'

  - id: signatory-cli-linux-arm64
    binary: signatory-cli
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    main: ./cmd/signatory-cli/main.go
    ldflags:
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitBranch={{.Version}}'
    goos:
      - linux
    goarch:
      - arm64
    flags:
      - '{{ if .IsSnapshot }}-cover{{ else }}-v{{ end }}'

  - id: signatory-linux-arm
    binary: signatory
    env:
      - CGO_ENABLED=1
      - CC=arm-linux-gnueabihf-gcc
      - CXX=arm-linux-gnueabihf-g++
    main: ./cmd/signatory/main.go
    ldflags:
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitBranch={{.Version}}'
    goos:
      - linux
    goarch:
      - arm
    goarm:
      - '7'
    flags:
      - '{{ if .IsSnapshot }}-cover{{ else }}-v{{ end }}'

  - id: signatory-cli-linux-arm
    binary: signatory-cli
    env:
      - CGO_ENABLED=1
      - CC=arm-linux-gnueabihf-gcc
      - CXX=arm-linux-gnueabihf-g++
    main: ./cmd/signatory-cli/main.go
    ldflags:
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitBranch={{.Version}}'
    goos:
      - linux
    goarch:
      - arm
    goarm:
      - '7'
    flags:
      - '{{ if .IsSnapshot }}-cover{{ else }}-v{{ end }}'

# Static builds (for standalone archives, no glibc dependency)
# Skipped during snapshot/PR builds to save CI time.
# Uses the same glibc cross-compilers as dynamic builds but with static
# linking flags. dlopen won't work (PKCS11 users should use Docker).
  - id: signatory-linux-amd-static
    skip: '{{ .IsSnapshot }}'
    binary: signatory
    env:
      - CGO_ENABLED=1
      - CC=gcc
    main: ./cmd/signatory/main.go
    tags:
      - netgo
      - osusergo
    ldflags:
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitBranch={{.Version}}'
      - '-linkmode external'
      - '-extldflags "-static"'
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -v

  - id: signatory-cli-linux-amd-static
    skip: '{{ .IsSnapshot }}'
    binary: signatory-cli
    env:
      - CGO_ENABLED=1
      - CC=gcc
    main: ./cmd/signatory-cli/main.go
    tags:
      - netgo
      - osusergo
    ldflags:
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitBranch={{.Version}}'
      - '-linkmode external'
      - '-extldflags "-static"'
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -v

  - id: signatory-linux-arm64-static
    skip: '{{ .IsSnapshot }}'
    binary: signatory
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
    main: ./cmd/signatory/main.go
    tags:
      - netgo
      - osusergo
    ldflags:
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitBranch={{.Version}}'
      - '-linkmode external'
      - '-extldflags "-static"'
    goos:
      - linux
    goarch:
      - arm64
    flags:
      - -v

  - id: signatory-cli-linux-arm64-static
    skip: '{{ .IsSnapshot }}'
    binary: signatory-cli
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
    main: ./cmd/signatory-cli/main.go
    tags:
      - netgo
      - osusergo
    ldflags:
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitBranch={{.Version}}'
      - '-linkmode external'
      - '-extldflags "-static"'
    goos:
      - linux
    goarch:
      - arm64
    flags:
      - -v

  - id: signatory-linux-arm-static
    skip: '{{ .IsSnapshot }}'
    binary: signatory
    env:
      - CGO_ENABLED=1
      - CC=arm-linux-gnueabihf-gcc
    main: ./cmd/signatory/main.go
    tags:
      - netgo
      - osusergo
    ldflags:
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitBranch={{.Version}}'
      - '-linkmode external'
      - '-extldflags "-static"'
    goos:
      - linux
    goarch:
      - arm
    goarm:
      - '7'
    flags:
      - -v

  - id: signatory-cli-linux-arm-static
    skip: '{{ .IsSnapshot }}'
    binary: signatory-cli
    env:
      - CGO_ENABLED=1
      - CC=arm-linux-gnueabihf-gcc
    main: ./cmd/signatory-cli/main.go
    tags:
      - netgo
      - osusergo
    ldflags:
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/ecadlabs/signatory/pkg/metrics.GitBranch={{.Version}}'
      - '-linkmode external'
      - '-extldflags "-static"'
    goos:
      - linux
    goarch:
      - arm
    goarm:
      - '7'
    flags:
      - -v

archives:
  - ids:
      - signatory-linux-amd-static
      - signatory-cli-linux-amd-static
      - signatory-linux-arm64-static
      - signatory-cli-linux-arm64-static
      - signatory-linux-arm-static
      - signatory-cli-linux-arm-static

dockers_v2:
  - id: release
    ids:
      - signatory-linux-amd
      - signatory-cli-linux-amd
      - signatory-linux-arm64
      - signatory-cli-linux-arm64
      - signatory-linux-arm
      - signatory-cli-linux-arm
    images:
      - ecadlabs/signatory
    tags:
      - '{{ .Tag }}'
      - latest
    dockerfile: goreleaser.dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
    labels:
      org.opencontainers.image.created: '{{.Date}}'
      org.opencontainers.image.name: '{{.ProjectName}}'
      org.opencontainers.image.revision: '{{.FullCommit}}'
      org.opencontainers.image.version: '{{.Version}}'
      org.opencontainers.image.source: '{{.GitURL}}'
    disable: '{{ .IsSnapshot }}'
  - id: snapshot
    ids:
      - signatory-linux-amd
      - signatory-cli-linux-amd
      - signatory-linux-arm64
      - signatory-cli-linux-arm64
      - signatory-linux-arm
      - signatory-cli-linux-arm
    images:
      - ghcr.io/ecadlabs/signatory
    tags:
      - '{{ .FullCommit }}'
    dockerfile: goreleaser.dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
    labels:
      org.opencontainers.image.created: '{{.Date}}'
      org.opencontainers.image.name: '{{.ProjectName}}'
      org.opencontainers.image.revision: '{{.FullCommit}}'
      org.opencontainers.image.version: '{{.Version}}'
      org.opencontainers.image.source: '{{.GitURL}}'
    disable: '{{ not .IsSnapshot }}'

checksum:
  name_template: checksums.txt
snapshot:
  version_template: 'SNAPSHOT-{{.ShortCommit}}'
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^website:'
      - '^test:'

release:
  prerelease: auto
